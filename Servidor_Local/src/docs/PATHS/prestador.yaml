paths:
    # listar todos os prestadores
    /prestador:
        get:
            tags:
                - Prestador
            summary: Listar todos os prestadores
            description: Retorna uma lista de todos os prestadores cadastrados
            responses:
                '200':
                    description: listar todos os prestadores
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/prestador'
                '404':
                    description: Nenhuma prestador encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestadorError'
    /prestador/create:
        post:
            tags:
                - Prestador
            summary: Criar um novo prestador
            description: Cria um novo prestador
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/prestador'
            responses:
                '200':
                    description: Prestador criado com sucesso
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestador'
                '404':
                    description: Prestador não encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestadorError'
    /prestador/getById/{id}:
        get:
            tags:
                - Prestador
            summary: Buscar um prestador por ID
            description: Retorna um prestador específico pelo seu ID
            parameters:
                - name: id
                  in: path
                  required: true
                  description: ID do prestador a ser buscado
                  schema:
                    type: string
            responses:
                '200':
                    description: Prestador encontrado com sucesso
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestador'
                '404':
                    description: Prestador não encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestadorError'
    /prestador/update/{id}:
        put:
            tags:
                - Prestador
            summary: Atualizar um prestador por ID
            description: Atualiza um prestador específico pelo seu ID
            parameters:
                - name: id
                  in: path
                  required: true
                  description: ID do prestador a ser atualizado
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/prestador'
            responses:
                '200':
                    description: Prestador atualizado com sucesso
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestador'
                '404':
                    description: Prestador não encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestadorError'
    /prestador/delete/{id}:
        delete:
            tags:
                - Prestador
            summary: Deletar um prestador por ID
            description: Deleta um prestador específico pelo seu ID
            parameters:
                - name: id
                  in: path
                  required: true
                  description: ID do prestador a ser deletado
                  schema:
                    type: string
            responses:
                '200':
                    description: Prestador deletado com sucesso
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestador'
                '404':
                    description: Prestador não encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/prestadorError'
                                