paths:
  # buscar todas as prestacoes de servico
  /prestacao_servico:
    get:
      tags:
        - Prestacao de servico
      summary: Buscar todas as prestacoes de servico
      description: Retorna uma lista de todas as prestacoes de servico cadastradas
      responses:
        '200':
          description: prestacao de servico encontrada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servico'
        '404':
          description: Nenhuma prestacao de servico encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servicoError'
  # buscar uma prestacao de servico por id
  /prestacao_servico/create:
    post:
      tags:
        - Prestacao de servico
      summary: Criar uma prestacao de servico
      description: Cria uma prestacao de servico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/prestacao_servico'
      responses:
        '200':
          description: prestacao de servico criada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servico'
        '404':
          description: Nenhuma prestacao de servico encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servicoError'
  /prestacao_servico/getById/{id}:
    get:
      tags:
        - Prestacao de servico
      summary: Buscar uma prestacao de servico por id
      description: Retorna uma prestacao de servico cadastrada
      parameters:
        - name: id
          in: path
          required: true
          description: id da prestacao de servico
          schema:
            type: string
      responses:
        '200':
          description: prestacao de servico encontrada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servico'
        '404':
          description: Nenhuma prestacao de servico encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servicoError'
  # atualizar uma prestacao de servico
  /prestacao_servico/update/{id}:
    put:
      tags:
        - Prestacao de servico
      summary: Atualizar uma prestacao de servico
      description: Atualiza uma prestacao de servico cadastrada
      parameters:
        - name: id
          in: path
          required: true
          description: id da prestacao de servico
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/prestacao_servico'
      responses:
        '200':
          description: prestacao de servico atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servico'
        '404':
          description: Nenhuma prestacao de servico encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servicoError'
  # deletar uma prestacao de servico
  /prestacao_servico/delete/{id}:
    delete:
      tags:
        - Prestacao de servico
      summary: Deletar uma prestacao de servico
      description: Deleta uma prestacao de servico cadastrada
      parameters:
        - name: id
          in: path
          required: true
          description: id da prestacao de servico
          schema:
            type: string
      responses:
        '200':
          description: prestacao de servico deletada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servico'
        '404':
          description: Nenhuma prestacao de servico encontrada
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servicoError'
  # buscar todas as prestacoes de servico detalhadas
  /prestacao_servico/get-all-detalhado:
    get:
      tags:
        - Prestacao de servico
      summary: Buscar todas as prestacoes de servico detalhadas
      description: Retorna uma lista de todas as prestacoes de servico detalhadas
      parameters:
        - name: limit
          in: query
          required: false
          description: limite de prestacoes de servico a serem retornadas
          schema:
            type: string
            example: "10"
        - name: offset
          in: query
          required: false
          description: offset de prestacoes de servico a serem retornadas
          schema:
            type: string
            example: "0"
      responses:
        '200':
          description: prestacao de servico encontrada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servico'
        '500':
          description: Erro ao buscar prestacao de servico
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servicoError'
  # buscar todas as prestacoes de servico por categoria
  /prestacao_servico/get-all-categoria/{idCategoria}:
    get:
      tags:
        - Prestacao de servico
      summary: Buscar todas as prestacoes de servico por categoria
      description: Retorna uma lista de todas as prestacoes de servico por categoria
      parameters:
        - name: idCategoria
          in: path
          required: true
          description: id da categoria
          schema:
            type: string
            example: "1"
      responses:
        '200':
          description: prestacao de servico encontrada com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servico'
        '500':
          description: Erro ao buscar prestacao de servico
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/prestacao_servicoError'