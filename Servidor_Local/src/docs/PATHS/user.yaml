paths:
  # criar um novo user
  /user/create:
    post:
      tags:
        - User
      summary: Criar um novo user
      description: Cria um novo user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: user criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usersucess'
        '404':
          description: user nao encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'
  # listar todos os users
  /user:
    get:
      tags:
        - User
      summary: Listar todos os users
      description: Retorna uma lista de todos os users cadastrados
      responses:
        '200':
          description: listar todos os users
          content:  
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '404':
          description: Nenhum user encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'
  # buscar um user por id
  /user/getById/{id}:
    get:
      tags:
        - User
      summary: Buscar um user por id
      description: Busca um user por id
      parameters:
        - name: id
          in: path
          required: true
          description: id do user a ser buscado
          schema:
            type: string
            example: 29443a96-63a2-46d5-ab92-2be8d79f9692
      responses:
        '200':
          description: user encontrado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/User'
        '404':
          description: user não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'
  # atualizar um user
  /user/update/{id}:
    put:
      tags:
        - User
      summary: Atualizar um user
      description: Atualiza um user
      parameters:
        - name: id
          in: path
          required: true
          description: id do user a ser atualizado
          schema:
            type: string
            example: 29443a96-63a2-46d5-ab92-2be8d79f9692
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: user atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/User'
        '400':
          description: user dados invalidos
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'
        '404':
          description: user não atualizado
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'

    # deletar um user
  /user/delete/{id}:
    delete:
      tags:
        - User
      summary: Deletar um user
      description: Deleta um user
      parameters:
        - name: id
          in: path
          required: true
          description: id do user a ser deletado
          schema:
            type: string
            example: 29443a96-6reeykku151651j5jj456jk57kj7
      responses:
        '200':
          description: user deletado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usersucess'
        '404':
          description: user não deletado
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'
  # login de um user
  /user/login:
    post:
      tags:
        - User
      summary: Login de um user
      description: Login de um user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/login'
      responses:
        '200':
          description: user logado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/login'
        '400':
          description: user dados invalidos
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/loginerror'
        '404': 
          description: user não logado
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/loginerror'   
  # update password de um user
  /user/updatePassword/{id}:
    put:
      tags:
        - User
      summary: Update password de um user
      description: Update password de um user
      parameters:
        - name: id
          in: path
          required: true
          description: id do user a ser atualizado
          schema:
            type: string
            example: 29443a96-63a2-46d5-ab92-2be8d79f9692
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: '#/components/schemas/updatePassword'
      responses:
        '200':
          description: user update password com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usersucess'
        '400':
          description: user update password dados invalidos
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'
        '404':
          description: user update password não atualizado
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/usererror'
        

