paths: 
    # listar todos os servicos
    /servico:
        get:
            tags:
                - Servico
            summary: Listar todos os Servicos
            description: Retorna uma lista de todos os servicos cadastrados
            responses:
                '200':
                    description: listar todos os servicos
                    content:  
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/servico'
                '404':
                    description: Nenhum servico encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/RespostaError'
    # criar um novo servico
    /servico/create:
        post:
            tags:
                - Servico
            summary: Criar um novo servico
            description: Cria um novo servico
            requestBody:
                required: true
                content:   
                    application/json:
                        schema:
                            type: object
                            $ref: '#/components/schemas/createServico'
            responses:
                '200':
                    description: servico criado com sucesso
                    content:  
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/responseSucesso'
                '400':
                    description: dados invalidos
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/RespostaError'   
    # buscar um servico por id
    /servico/getById/{id}:
        get:
            tags:
                - Servico
            summary: Buscar um servico por id
            description: Busca um servico por id
            parameters:
                - name: id
                  in: path
                  required: true
                  description: id do servico a ser buscado
                  schema:
                    type: string
                    example: 1
            responses:
                '200':
                    description: servico encontrado com sucesso
                    content:  
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/responseSucessoBuscarServico'
                '400':
                    description: dados invalidos
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/RespostaError'   
    # atualizar um servico por id
    /servico/update/{id}:
        put:
            tags:
                - Servico
            summary: Atualizar um servico
            description: Atualiza um servico especifico por id
            parameters:
                - name: id
                  in: path
                  required: true
                  description: id do servico a ser atualizado
                  schema:
                    type: string
                    example: 1
            requestBody:
                required: true
                content:  
                    application/json:
                        schema:
                            type: object
                            $ref: '#/components/schemas/createServico'
            responses:
                '200':
                    description: servico atualizado com sucesso
                    content: #conteudo da resposta
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/responseSucesso'
                '400':
                    description: dados invalidos
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/RespostaErrorAtualizarServico'   
                '404':
                    description: servico nao encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/RespostaErrorServicoNaoEncontrado'  
    # deletar servico por id
    /servico/delete/{id}:
        delete:
            tags:
                - Servico
            summary: Deletar um Servico
            description: Deletar um servico especifico por id
            parameters: 
                - name: id
                  in: path
                  required: true
                  description: id do servico a ser deletado
                  schema: 
                      type: integer
                      example: 1
            responses:
                '200': 
                    description: 'servico deletado com sucesso'
                    content:
                        application/json: 
                            schema:
                                type: object
                                $ref: '#/components/schemas/responseSucesso'
                '404':
                    description: servico nao encontrado
                    content:
                        application/json:
                            schema:
                                type: object
                                $ref: '#/components/schemas/RespostaError'   



                                