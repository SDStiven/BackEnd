components:
    schemas:
        prestador:
            type: object
            properties:
                id:
                    type: string
                    example: 1
                nome:
                    type: string
                    example: "prestador-teste"
                profissao:
                    type: string
                    example: "engenheiro"
                taxa_urgencia:
                    type: number
                    example: 1
                minimo_desconto:
                    type: number
                    example: 1
                nif:
                    type: number
                    example: 1
                persentagem_desconto:
                    type: number
                    example: 1
                preco_hora:
                    type: number
                    example: 1
                disponivel:
                    type: boolean
                    example: true
        prestadorError:
            type: object
            properties:
                message:
                    type: string
                    example: "error"
                status:
                    type: boolean
                    example: false
                data:
                    type: object
                    example: null
