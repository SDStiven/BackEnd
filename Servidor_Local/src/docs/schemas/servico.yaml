# schema/servico.yaml

# id:string
#   nome: string;
#   descricao: string;
#   categoria: string;
#   enabled: boolean;
#   created_at: string;
#   updated_at: string;
# }
  
components:
  schemas:
    # schemas principal de servico para listar todos os servicos
    servico:
      type: object
      properties:
        id: 
          type: integer
          example: 1
        nome:
          type: string
          example: 'Servico de limpeza'
        descricao:
          type: string
          example: 'Servico de limpeza profissional para residencia'
        categoria:
          type: string
          example: Limpeza
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          example: '2022-01-01 00:00:00'
        updated_at:
          type: string
          example: '2022-01-01 00:00:00'
    # schemas para criar servico
    createServico:
      type: object 
      properties:
        nome:
          type: string
          example: 'Servico de Limpeza'
        descricao:
          type: string
          example: 'Servico de limpeza profissional para residencia'
        categoria:
          type: string
          example: Limpeza
        enabled:
          type: boolean
          example: true
        updated_at:
          type: string
          example: '2022-01-01 00:00:00'
    # schemas para atualizar servico
    updateServico:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: 'Servico de Limpeza'
        descricao:
          type: string
          example: 'Servico de limpeza profissional para residencia'
        categoria:
          type: string
          example: Limpeza
        enabled:
          type: boolean
          example: true
    # schemas para deletar servico
    deleteServico:
      type: object
      properties:
        id:
          type: integer
          example: 1

    # schemas para buscar servico por nome
    getServicoByName:
      type: object
      properties:
        nome:
          type: string
          example: 'Servico de Limpeza'
    # schemas para buscar servico por categoria
    getServicoByCategory:
      type: object
      properties:
        categoria:
          type: string
          example: Limpeza

    # schemas generico para sucesso
    responseSucesso:
      type: object
      properties:
        message:
          type: string
          example: servico criado com sucesso
        status:
          type: boolean
          example: true
        data:
          type: object
    # schemas para atualizar servico com sucesso
    responseSucessoAtualizarServico:
      type: object
      properties:
        message:
          type: string
          example: servico atualizado com sucesso
        status:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            nome:
              type: string
              example: 'Servico de Limpeza'
            descricao:
              type: string
              example: 'Servico de limpeza profissional para residencia'
            categoria:
              type: string
              example: Limpeza
            enabled:
              type: boolean
              example: true
            created_at:
              type: string
              example: '2022-01-01 00:00:00'
            updated_at:
              type: string
              example: '2022-01-01 00:00:00'
            
    # schemas para buscar servico com sucesso
    responseSucessoBuscarServico:
      type: object
      properties:
        message:
          type: string
          example: servico encontrado com sucesso
        status:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
            nome:
              type: string
              example: 'Servico de Limpeza'
            descricao:
              type: string
              example: 'Servico de limpeza profissional para residencia'
            categoria:
              type: string
              example: Limpeza
            enabled:
              type: boolean
              example: true
            created_at:
              type: string
              example: '2022-01-01 00:00:00'
            updated_at:
              type: string
              example: '2022-01-01 00:00:00'
      
    # schemas de resposta de erro
    RespostaError:
      type: object
      properties:
        message:
          type: string
          example: error ao buscar servico   
        status:
          type: boolean
          example: false
        data:
          type: object
    # schemas para atualizar servico com erro
    RespostaErrorAtualizarServico:
      type: object
      properties:
        message:
          type: string
          example: error ao atualizar servico   
        status:
          type: boolean
          example: false
        data:
          type: object
    # schemas para buscar servico com erro
    RespostaErrorServicoNaoEncontrado:
      type: object
      properties:
        message:
          type: string
          example: servico nao encontrado   
        status:
          type: boolean
          example: false
        data:
          type: object
   # schemas para listar servicos detalhados
    servicoDetalhado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: 'Servico de Limpeza'
        descricao:
          type: string
          example: 'Servico de limpeza profissional para residencia'
        designacao_categoria:
          type: string
          example: 'Designacao da Categoria'
        icone_categoria:
          type: string
          example: 'Icone da Categoria'
        empresa:
          type: string
          example: 'Empresa de Limpeza'
        designacao_empresa:
          type: string
          example: 'Designacao da Empresa'
        icone_empresa:
          type: string
          example: 'Icone da Empresa'
        enable:
          type: boolean
          example: true
         