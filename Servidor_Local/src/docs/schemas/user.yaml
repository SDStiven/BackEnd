components:
  schemas:
    # schemas principal para listar todos os users
    user:
      type: object
      properties:
        id: 
          type: string
          example: 1
        nome: 
          type: string
          example: "Stiven Dias"
        numero_identificacao: 
          type: string
          example: "123456789"
        data_nascemento: 
          type: string
          example: "2000-01-01"
        email: 
          type: string
          example: "[EMAIL_ADDRESS]"
        telefone: 
          type: string
          example: "123456789"
        pais: 
          type: string
          example: "Angola"
        localidade: 
          type: string
          example: "Luanda"
        password: 
          type: string
          example: "123456789"
        enabled: 
          type: boolean
          example: true
        created_at: 
          type: string
          example: "2000-01-01"
        update_at: 
          type: string
          example: "2000-01-01"
    # schemas para criar um novo user
    createUser:
      type: object
      properties:
        nome: 
          type: string
          example: "Stiven Dias"
        numero_identificacao: 
          type: string
          example: "123456789"
        data_nascemento: 
          type: string
          example: "2000-01-01"
        email: 
          type: string
          example: "[EMAIL_ADDRESS]"
        telefone: 
          type: string
          example: "123456789"
        pais: 
          type: string
          example: "Angola"
        localidade: 
          type: string
          example: "Luanda"
        password: 
          type: string
          example: "123456789"
        enabled: 
          type: boolean
          example: true

