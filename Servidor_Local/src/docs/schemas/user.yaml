components:
  schemas:
    # schemas para criar um novo user
    User:
      type: object
      properties:
        nome: 
          type: string
          example: "Stiven Dias"
        numero_identificacao: 
          type: string
          example: "123456789"
        data_nascemento: 
          type: string
          example: "01-02-2000"
        email: 
          type: string
          example: "stiven@2222.com"
        telefone: 
          type: string
          example: "123456789"
        pais: 
          type: string
          example: "Angola"
        localidade: 
          type: string
          example: "Luanda"
        password: 
          type: string
          example: "123456789"
        enabled: 
          type: boolean
          example: true
    usersucess:
      type: object
      properties:
        message: 
          type: string
          example: "sucesso"
        status: 
          type: boolean
          example: true
        data: 
          type: object
          example: null
    usererror:
      type: object
      properties:
        message: 
          type: string
          example: "erro"
        status: 
          type: boolean
          example: false
        data: 
          type: object
          example: null

    login:
      type: object
      properties:
        email: 
          type: string
          example: "stiven@2222.cpm"
        password: 
          type: string
          example: "123456789"
    loginerror:
      type: object
      properties:
        message: 
          type: string
          example: "erro"
        status: 
          type: boolean
          example: false
        data: 
          type: object
          example: null
    updatePassword:
      type: object
      properties:
        password: 
          type: string
          example: "123456789"
        newPassword: 
          type: string
          example: "123456789"