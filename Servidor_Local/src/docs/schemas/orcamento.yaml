components:
  schemas:

    orcamento:
      type: object
      properties:
        id:
          type: string
          example: 1
        id_cliente:
          type: string
          example: 1
        id_prestador:
          type: string
          example: 1
        id_servico:
          type: string
          example: 1
        preco_hora:
          type: number
          example: 1
        preco_estimado:
          type: number
          example: 1
        estado:
          type: string
          example: 1
        anable:
          type: boolean
          example: true
        created_at:
          type: string
          example: 1
        updated_at:
          type: string
          example: 1
    # Resposta de erro
    RespostaErrorOrcamento:
      type: object
      properties:
        message:
          type: string
          example: "orcamento nao encontrado"
        status:
          type: boolean
          example: false
        data:
          type: object
          example: null
    # Resposta de sucesso
    RespostaSucessoOrcamento:
      type: object
      properties:
        message:
          type: string
          example: "orcamento criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          example: null
