components:
  schemas:

    orcamento:
      type: object
      properties:
        total:
          type: number
          example: 1
        id_utilizador:
          type: string
          example: 1
        enable:
          type: boolean
          example: true
    # Resposta de erro
    RespostaErrorOrcamento:
      type: object
      properties:
        message:
          type: string
          example: "orcamento nao encontrado"
        status:
          type: boolean
          example: false
        data:
          type: object
          example: null
    # Resposta de sucesso
    RespostaSucessoOrcamento:
      type: object
      properties:
        message:
          type: string
          example: "orcamento criado com sucesso"
        status:
          type: boolean
          example: true
        data:
          type: object
          example: null
